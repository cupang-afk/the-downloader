# git-cliff configuration file
# For more information, see https://git-cliff.org/docs/configuration

[changelog]
# Template for the changelog body
# https://keats.github.io/tera/docs/#introduction
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat = "v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## Unreleased
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim }}
{% for commit in commits %}
- {{ commit.message | striptags | trim | split(pat="\n") | first }} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/username/repo/commit/{{ commit.id }}))
{% endfor %}
{% endfor %}
"""

# Template for the changelog footer
footer = """
<!-- Section generated by git-cliff {{ git_version }} -->
"""

[git]
# Parse commits since the given tag
# range = "v1.0.0..HEAD"
# Parse commits since the given tag
# tag_pattern = "v[0-9]*"
# Regex to match the tag
# highlight_tags = "v[0-9]*"
# Regex to filter out commits that don't match the tag
# exclude_tags = ""
# Sort the commits by the given order
# sort = "oldest"
# The sorting order of the groups
# group_order = ["Features", "Bug Fixes", "Performance", "Documentation", "Refactor", "Build", "Tests", "Chore", "Revert"]

# Tag to start from
# tag = ""

# Maximum number of commits to include
# limit = 50

# If `true`, git-cliff will replace reference links with Markdown links
# link_parsers = []

# A list of plugins to load
# plugins = []

# A list of custom parser to add
# [git.extra_parsers]

# https://github.com/orhun/git-cliff/issues/525
# Commit message parser
#   - First group: message after the type
#   - Second group: optional scope
#   - Third group: optional ! for breaking changes
#   - Fourth group: commit message
# message = """
#     (?s) # s: . matches newlines
#     ^(?P<type>[a-zA-Z]+)(?:\((?P<scope>[\w/.-]+)\))?(?P<breaking>!)?:\s*
#     (?P<message>.*)
#     """
#   """

# [git.commit_parsers]
#   # https://www.conventionalcommits.org/en/v1.0.0/
#   conventionalcommits = true
#   # Filter out commits that are not conventional
#   filter_commits = false

[git.preprocessors]
# https://github.com/orhun/git-cliff/issues/537
# Regex to replace links with markdown links
#   [[git.preprocessors]]
#   pattern = \[([^\]]+)\]\(([^\)]+)\)
#   replace = "[$1]($2)"

# # Regex to replace issues with links
#   [[git.preprocessors]]
#   pattern = "([a-zA-Z0-9]+)-([0-9]+)"
#   replace = "[$1-$2](https://github.com/username/repo/issues/$1-$2)"

[git.linkparsers]
# https://github.com/orhun/git-cliff/issues/680
# Pattern to link a commit in a commit message
#   [[git.linkparsers]]
#   pattern = "([a-f0-9]+)"
#   replace = "[$1](https://github.com/username/repo/commit/$1)"

# Pattern to link an issue in a commit message
#   [[git.linkparsers]]
#   pattern = "#([0-9]+)"
#   replace = "[#$1](https://github.com/username/repo/issues/$1)"

[tool.git-cliff]
# The configuration file used by git-cliff.
# config = "cliff.toml"

# Sets the directory where the changelog file is generated.
# output = "CHANGELOG.md"

# Sets the template file that is used to generate the changelog.
# template = ""

# Sets the commit range to generate the changelog for.
# range = ""

# Sets the tag to generate the changelog for.
# tag = ""

# Sets the date format for the changelog.
# date_format = "%Y-%m-%d"

# Sets the depth of the changelog.
# depth = 10

# Sets the number of lines to include in the changelog body.
# body_lines = 5

# Sets the maximum number of commits to include in the changelog.
# limit = 50

# Sets the commit link format.
# commit_link = ""

# Sets the issue link format.
# issue_link = ""

# Sets the branch to use for the changelog.
# branch = ""

# Sets the regex to match the tag.
# tag_pattern = ""

# Sets the sections order.
# sections = ["feat", "fix", "perf", "refactor", "build", "ci", "docs", "test", "chore", "revert"]

# Sets the ignore commit groups.
# ignore_groups = []

# Sets the sort order of sections.
# section_order = []

# Sets the ignore commits.
# ignore_commits = []

# Sets the commits to include.
# include_commits = []

# Sets the commits to exclude.
# exclude_commits = []

# Sets the commit groups to include.
# include_commit_groups = []

# Sets the top-level categories.
# top_level_categories = []

# Sets the commit group title max length.
# commit_group_title_max_length = 20

# Sets the commit message max length.
# commit_message_max_length = 72

# Sets the commit message strip.
# commit_message_strip = ""

# Sets the reference link format.
# reference_link_format = "(#{issue})"

# Sets the external link.
# external_link = false
